<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changing Page</title>
</head>
<body>
    <h2>Color changing Page</h2>
    <p id = "color-chage"></p>
    <script>
        let colors = ["pink", "lightblue", "yellow", "red", "green", "black", "white"];
        for(let i in colors) {
            setTimeout(() => {
                document.body.style.backgroundColor = colors[i];
            },i * 1000);
        }
    </script>
</body>
</html>
