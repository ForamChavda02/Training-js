<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <style>
        input {
            padding: 8px;
            width: 200px;
            margin-bottom: 4px;
        }
        .error {
            color: red;
            margin: 0;
        }
        .ok {
            color: green;
            margin: 0;
        }
        .field {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <form id="signupForm">
        <div class="field">
          <label>Name:</label><br>
          <input id="name" type="text" placeholder="Your Name">
          <p id="nameError" class="error"></p>
        </div>
        <div class="field">
            <label>Email:</label><br>
            <input id="email" type="text" placeholder="abc@gmail.com">
            <p id="emailError" class="error"></p>
        </div>
        <div class="field">
            <label>Password:</label><br>
            <input id="password" type="text" placeholder="Min 8 Character">
            <p id="passError" class="error"></p>
        </div>
        <div class="field">
            <label>Confirm Password:</label><br>
            <input id="confirmInput" type="password" placeholder="Repeat password">
            <p id="confirmError" class="error"></p>
        </div>
        <p><button type="submit">Create account</button></p>
    </form>
    <p id="result"></p>
    <script src="formValidation.js"></script>
</body>
</html>
