<!DOCTYPE html>
<html lang="en">
    <style>
            input {
                padding: 8px;
                width: 260px;
                margin-bottom: 4px;
            }
            .error {
                color: red;
                margin: 0;
            }
            .ok {
                color: green;
                margin: 0;
            }
            .field {
                margin-bottom: 12px;
            }
        </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup-form</title>
</head>
<body>
    <form id="signup-form">
        <div class="field">
            <lable>Name:</lable><br>
            <input id="name" type="text" placeholder="your name">
            <p id="nameError" class="error"></p>
        </div>
        <div class="field">
            <label>Email:</label><br>
            <input id="email" type="text" placeholder="name@gmail.com">
            <p id="emailError" class="error"></p>
        </div>
        <div class="field">
            <label>Password:</label><br>
            <input id="Password" type="text" placeholder="minimum 8 char">
            <p id="passwordError" class="error"></p>
        </div>
        <p><button type="submit">You are signed-in</button></p>
    </form>
    <p id="result"></p>
    <script src="form.js"></script>
</body>
</html>
