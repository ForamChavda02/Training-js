<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Websocket</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #messages { list-style-type: none; padding: 0; max-height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
        #messages li { padding: 8px; margin-bottom: 5px; background: #e3f2fd; border-radius: 4px; }
        form { display: flex; gap: 10px; margin-top: 10px; }
        input { flex-grow: 1; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Websocket Chat</h2>
    <ul id="message"></ul>
    <form id="chat-form">
        <input id="message-input" autocomplete="off" placeholder="type a message" required/>
        <button type="submit">Send</button>
    </form>

    <script>
        const socket = new WebSocket("ws://localhost:3000");

        const form = document.getElementById("chat-form");
        const input = document.getElementById("message-input");
        const messageList = document.getElementById("messages");

        socket.onmessage = (event) => {
            const item = document.createElement("li");
            item.textContent = event.data; 
            messageList.appendChild(item);
            messageList.scrollTop = messageList.scrollHeight;
        };

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            if(input.value && socket.readyState === WebSocket.OPEN) {
                socket.send(input.value);
                input.value = "";
            }
        });

        socket.onopen = () => console.log("Conneted to server!");
        socket.onclose = () => console.log("Disconnected from server!");
    </script>
</body>
</html>
